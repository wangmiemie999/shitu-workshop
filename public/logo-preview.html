<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImageCraft · 图字 Logo 预览</title>
    <style>
      :root{--ink:#151515;--muted:#77746c;--line:#deddd7;--paper:#fdfdfb;--soft:#f4f3ee}
      *{box-sizing:border-box}
      body{margin:0;background:var(--paper);color:var(--ink);font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif}
      main{width:min(1120px,calc(100% - 40px));margin:58px auto 80px}
      .head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:28px}
      h1{font-family:Georgia,"Songti SC",serif;font-size:44px;font-weight:500;margin:0;letter-spacing:-.05em}
      p{margin:10px 0 0;color:var(--muted);line-height:1.8}
      .back{color:#151515;text-decoration:none;border-bottom:1px solid #151515;font-size:13px}
      .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
      .card{border:1px solid var(--line);border-radius:22px;background:white;padding:26px;min-height:330px;display:grid;grid-template-rows:1fr auto;gap:22px}
      .stage{border-radius:18px;background:linear-gradient(135deg,#fafaf7,#f1f0ea);display:grid;place-items:center;min-height:220px}
      .brand{display:flex;align-items:center;gap:14px}
      .brand-name{font-size:26px;font-weight:780;letter-spacing:.02em}
      .meta b,.meta small{display:block}
      .meta b{font-size:18px}
      .meta small{font-size:12px;color:var(--muted);margin-top:6px}
      svg{display:block;overflow:visible}
      .logo-mark{width:72px;height:72px}
      .logo-1 .frame{fill:#fff;stroke:#151515;stroke-width:5}
      .logo-1 .char{font:700 38px Georgia,"Songti SC",serif;dominant-baseline:middle;text-anchor:middle;fill:#151515}
      .logo-1 .inner{fill:none;stroke:#151515;stroke-width:2;opacity:.2}
      .logo-2 .seal{fill:#151515}
      .logo-2 .char{font:700 36px Georgia,"Songti SC",serif;dominant-baseline:middle;text-anchor:middle;fill:#fff}
      .logo-2 .chip{fill:#fff;opacity:.18}
      .logo-3 .corner{fill:none;stroke:#151515;stroke-width:6;stroke-linecap:round}
      .logo-3 .char{font:700 39px Georgia,"Songti SC",serif;dominant-baseline:middle;text-anchor:middle;fill:#151515}
      .logo-3 .dot{fill:#151515;opacity:.25}
      .logo-4 .scribble{fill:none;stroke:#151515;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .logo-4 .char{font:700 40px "STKaiti","KaiTi",Georgia,serif;dominant-baseline:middle;text-anchor:middle;fill:#151515}
      .logo-4 .ghost{fill:none;stroke:#151515;stroke-width:2;opacity:.18}
      @media(max-width:760px){.head{display:block}.grid{grid-template-columns:1fr}.brand-name{font-size:22px}.card{padding:20px}}
    </style>
  </head>
  <body>
    <main>
      <div class="head">
        <div>
          <h1>“图”字 Logo 预览</h1>
          <p>黑白版本，无橙色点缀。先选方向，再替换到ImageCraft网页里。</p>
        </div>
        <a class="back" href="/">返回首页</a>
      </div>

      <section class="grid" aria-label="图字 logo 方案">
        <article class="card">
          <div class="stage">
            <div class="brand">
              <svg class="logo-mark logo-1" viewBox="0 0 80 80" aria-hidden="true">
                <rect class="frame" x="10" y="10" width="60" height="60" rx="13" />
                <rect class="inner" x="20" y="20" width="40" height="40" rx="6" />
                <text class="char" x="40" y="42">图</text>
              </svg>
              <span class="brand-name">ImageCraft</span>
            </div>
          </div>
          <div class="meta"><b>01 方框图字版</b><small>像图片画框，稳、清晰、适合导航栏。</small></div>
        </article>

        <article class="card">
          <div class="stage">
            <div class="brand">
              <svg class="logo-mark logo-2" viewBox="0 0 80 80" aria-hidden="true">
                <path class="seal" d="M16 12h48c5 0 9 4 9 9v38c0 5-4 9-9 9H16c-5 0-9-4-9-9V21c0-5 4-9 9-9Z" />
                <path class="chip" d="M22 20h18v8H22zM47 51h13v7H47z" />
                <text class="char" x="40" y="42">图</text>
              </svg>
              <span class="brand-name">ImageCraft</span>
            </div>
          </div>
          <div class="meta"><b>02 印章图字版</b><small>更像工坊品牌印记，厚重、有识别度。</small></div>
        </article>

        <article class="card">
          <div class="stage">
            <div class="brand">
              <svg class="logo-mark logo-3" viewBox="0 0 80 80" aria-hidden="true">
                <path class="corner" d="M18 30V18h12M50 18h12v12M62 50v12H50M30 62H18V50" />
                <circle class="dot" cx="40" cy="40" r="25" />
                <text class="char" x="40" y="42">图</text>
              </svg>
              <span class="brand-name">ImageCraft</span>
            </div>
          </div>
          <div class="meta"><b>03 取景框图字版</b><small>像在框选/拾取画面，产品含义最直接。</small></div>
        </article>

        <article class="card">
          <div class="stage">
            <div class="brand">
              <svg class="logo-mark logo-4" viewBox="0 0 80 80" aria-hidden="true">
                <path class="ghost" d="M13 19c11-8 42-9 54 0 5 12 4 35-1 45-16 5-37 5-53 0-5-12-5-33 0-45Z" />
                <path class="scribble" d="M18 20c12-7 35-8 45 0M63 20c6 11 5 31 0 42M63 62c-13 6-34 6-47 0M16 62c-5-13-5-30 2-42" />
                <text class="char" x="40" y="42">图</text>
              </svg>
              <span class="brand-name">ImageCraft</span>
            </div>
          </div>
          <div class="meta"><b>04 手写线稿版</b><small>更贴近手绘插图气质，轻松、有温度。</small></div>
        </article>
      </section>
    </main>
  </body>
</html>
